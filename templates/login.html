<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin-top:150px;
}

input{
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
}

</style>

</head>

<body>

<h1>Login</h1>

<form method="post" action="/login">

<input type="text" name="username" placeholder="Username">

<br>

<input type="password" name="password" placeholder="Password">

<br>

<button type="submit">Login</button>

</form>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

</body>
</html>
